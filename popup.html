<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Partslink24 Extractor</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>Partslink24 Extractor</h1>
          <p id="status">Open a Partslink24 page, then extract visible data.</p>
        </div>
      </header>

      <section class="toolbar" aria-label="Extractor actions">
        <button id="extractBtn" type="button">Extract</button>
        <button id="copyBtn" type="button" disabled>Copy JSON</button>
        <button id="csvBtn" type="button" disabled>CSV</button>
        <button id="jsonBtn" type="button" disabled>JSON</button>
      </section>

      <section class="selectionBar" aria-label="Selection controls">
        <button id="selectAllBtn" type="button" disabled>Select all</button>
        <button id="clearSelectionBtn" type="button" disabled>Clear selection</button>
        <span><strong id="selectedCount">0</strong> selected</span>
      </section>

      <section class="summary" aria-live="polite">
        <div>
          <span class="label">Parts</span>
          <strong id="partCount">0</strong>
        </div>
        <div>
          <span class="label">Rows</span>
          <strong id="rowCount">0</strong>
        </div>
        <div>
          <span class="label">Candidates</span>
          <strong id="candidateCount">0</strong>
        </div>
      </section>

      <section class="preview">
        <h2>Extracted Parts</h2>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th class="selectCol">Export</th>
                <th>Part Number</th>
                <th>Name / Description</th>
                <th>Designation / Destination</th>
              </tr>
            </thead>
            <tbody id="partsBody">
              <tr>
                <td colspan="4" class="empty">No data extracted yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
